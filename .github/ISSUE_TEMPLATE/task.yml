name: Task
description: Track maintenance, documentation, or validation work.
title: "[Task]: "
labels: ["task"]
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How will maintainers know this is complete?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
