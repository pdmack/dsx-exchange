name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            auth-callout/go.sum
            auth-callout/tests/go.sum
            local/mqtt-client/go.sum
            local/mqttbs/go.sum

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install addlicense
        run: go install github.com/google/addlicense@latest

      - name: Run checks
        run: make check
