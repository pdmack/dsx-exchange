# Security note: No untrusted input is used in run commands. All ${{ ... }}
# expressions reference repository metadata or secrets only.

name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: linux-amd64-cpu4
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: NVIDIA/dsx-github-actions/.github/actions/semantic-release@07b465c2147fcbda4836cb869263577ea4719273 # v1.16.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-plugins: conventional-changelog-conventionalcommits
