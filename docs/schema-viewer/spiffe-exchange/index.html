ansparent;background:none;cursor:pointer;font-weight:400;font-size:14px;color:#666">Raw YAML</button></div><div style="padding:2rem">Loading schema...</div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"yaml":"# Copyright 2026 NVIDIA CORPORATION \u0026 AFFILIATES. All rights reserved.\n# SPDX-License-Identifier: Apache-2.0\n\nasyncapi: 3.1.0\ninfo:\n  title: SPIRE SPIFFE Exchange - Public Keysets\n  version: 1.0.0\n  description: |\n    AsyncAPI specification for publishing JWK (JSON Web Key) public keys on the\n    SPIFFE/SPIRE exchange topic. One JWK per message. Used to distribute public\n    keys for a given tenant and key identifier so consumers can verify JWS or\n    use keys for encryption.\n\n    **Topic format:** `spiffe-exchange/v1/pub-keysets/tenant/{tenant_domain}/kid/{kid}`\n\n    Payloads conform to RFC 7517 (JSON Web Key). Only public key material is\n    published on this channel.\nservers:\n  production:\n    host: broker.example.com\n    protocol: mqtt\n    description: MQTT broker for SPIFFE exchange public key distribution\nchannels:\n  pubKeysets:\n    address: \"spiffe-exchange/v1/pub-keysets/tenant/{tenant_domain}/kid/{kid}\"\n    parameters:\n      tenant_domain:\n        description: Tenant domain identifier (e.g. tenant namespace or domain name).\n      kid:\n        description: Key ID (kid) for this key; aligns with JWS/JWE header kid.\n    messages:\n      jwk:\n        $ref: \"#/components/messages/JwkMessage\"\n    title: Public Key Sets\noperations:\n  publishPubKeyset:\n    action: send\n    channel:\n      $ref: \"#/channels/pubKeysets\"\n    messages:\n      - $ref: \"#/channels/pubKeysets/messages/jwk\"\n    description: \u003e\n      Publish one JWK for the given tenant and kid. Publishers (e.g. SPIRE) use this to advertise a public key for verification or encryption.\n\n    title: Publish Public Key Set\n  subscribePubKeyset:\n    action: receive\n    channel:\n      $ref: \"#/channels/pubKeysets\"\n    messages:\n      - $ref: \"#/channels/pubKeysets/messages/jwk\"\n    description: \u003e\n      Subscribe to public key updates for a tenant and kid. Each message carries one JWK. Consumers use the key to verify signatures or encrypt.\n\n    title: Subscribe Public Key Set\ncomponents:\n  messages:\n    JwkMessage:\n      name: JwkMessage\n      title: JWK (RFC 7517)\n      contentType: application/json\n      payload:\n        $ref: \"#/components/schemas/Jwk\"\n  schemas:\n    Jwk:\n      type: object\n      required:\n        - kty\n      description: \u003e\n        Single JSON Web Key per RFC 7517. Only public key parameters are included on this channel. Key type (kty) determines which additional members are present.\n\n      properties:\n        kty:\n          type: string\n          description: Key type (e.g. RSA, EC, OKP).\n          enum:\n            - RSA\n            - EC\n            - OKP\n        use:\n          type: string\n          description: Public key use (sig, enc, or omitted).\n          enum:\n            - sig\n            - enc\n        key_ops:\n          type: array\n          items:\n            type: string\n          description: Key operations (e.g. verify, encrypt).\n        alg:\n          type: string\n          description: Algorithm (e.g. ES256, RS256, EdDSA).\n        kid:\n          type: string\n          description: Key ID; should match the topic kid when present.\n        # RSA public key parameters (when kty is RSA)\n        n:\n          type: string\n          description: RSA modulus (Base64url).\n        e:\n          type: string\n          description: RSA public exponent (Base64url).\n        # EC public key parameters (when kty is EC)\n        crv:\n          type: string\n          description: Elliptic curve (e.g. P-256, P-384).\n        x:\n          type: string\n          description: EC x coordinate (Base64url).\n        y:\n          type: string\n          description: EC y coordinate (Base64url).\n        # OKP (e.g. Ed25519): public key is in 'x'. Private key (d) MUST NOT be published here.\n"},"__N_SSG":true},"page":"/[spec]","query":{"spec":"spiffe-exchange"},"buildId":"_jnd2Xdug_yJ1jBLUt3YO","assetPrefix":"..","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
