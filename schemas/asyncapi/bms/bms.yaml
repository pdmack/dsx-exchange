    # =========================================================================
    # GenericPoint — field fragment and composed schemas
    # =========================================================================
    GenericPointFields:
      type: object
      description: >
        Field fragment for a vendor-specific or unmapped GenericPoint. `processArea` is required.


        `engUnit` and `stateText` are both optional but **mutually exclusive** — include at most one. See the two variants below.

      required:
        - processArea
      properties:
        pointType:
          type: string
          enum: [GenericPoint]
        processArea:
          type: array
          items:
            type: string
          description: >
            Required for GenericPoint. Describes the measurement context.

        phase:
          type: string
          enum: [A, B, C, "1", "2", "3"]
          description: >
            Optional electrical phase identifier. Use for phase-specific generic measurements on power-capable equipment. Letter form (A/B/C) and numeric form (1/2/3) are both accepted.

        integration:
          type: string
          description: >
            Optional integration identifier. When present, this integration is responsible for publishing the value for this point. The value topic is derived using the standard topic derivation rule.

        isSetpoint:
          type: boolean
          description: >
            Optional. When true, indicates this point is a setpoint (a target value written to control equipment behavior).

      anyOf:
        - title: Measurement
          description: >
            Continuous measurement with a known engineering unit. When `engUnit` is present, `stateText` must be absent.

          properties:
            engUnit:
              type: string
              description: >
                Engineering unit for the measurement.

          not:
            required: [stateText]
        - title: State
          description: >
            Binary or enumerated state point. When `stateText` is present, `engUnit` must be absent.

          properties:
            stateText:
              type: array
              description: >
                State label mapping. Each entry maps a numeric state value to its human-readable label (e.g., `[{value: 0, text: "Off"}, {value: 1, text: "On"}]`).

              items:
                type: object
                required: [value, text]
                properties:
                  value:
                    type: integer
                    description: Numeric state value.
                  text:
                    type: string
                    description: Human-readable label for this state.
                additionalProperties: false
          not:
            required: [engUnit]
    GenericEquipmentPointMetadata:
      description: |
        Metadata for a GenericPoint on any generic equipment objectType.

        Follows the standard equipment identifier modes:
        - **Named-object mode**: objectName + objectId required; servesId
          optional; associateId prohibited.
        - **Associate mode**: associateId required; objectName/objectId/servesId
          prohibited.

        Unlike typed points, `engUnit` and `stateText` are both optional.
        `processArea` is required.
      allOf:
        - $ref: '#/components/schemas/EquipmentMetadataBase'
        - $ref: '#/components/schemas/GenericPointFields'
      unevaluatedProperties: false
    GenericPowerMeterPointMetadata:
      description: |
        Metadata for a GenericPoint on PowerMeter equipment.
        Inherits the standard PowerMeter identifiers
        (objectName, objectId, servesId all required).
        `processArea` is required. `engUnit`, `stateText`, `phase`, and
        `integration` are optional.
      allOf:
        - $ref: '#/components/schemas/PowerMeterMetadataBase'
        - $ref: '#/components/schemas/GenericPointFields'
      unevaluatedProperties: false
