                description: Numeric state value.
              text:
                type: string
                description: Human-readable label for this state.
            additionalProperties: false
          examples:
            - - value: 0
                text: "NoIsolationRequested"
              - value: 1
                text: "IsolationRequested"
    # --- PowerMeter fields ---------------------------------------------------
    VoltageFields:
      type: object
      required: [engUnit]
      properties:
        pointType:
          type: string
          enum: [Voltage]
        objectType:
          type: string
          enum: [PowerMeter]
        engUnit:
          type: string
          #enum: [V]
