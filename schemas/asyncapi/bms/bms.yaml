# =============================================================================
# Components
# =============================================================================
components:
  messages:
    ValueMessage:
      name: ValueMessage
      title: Point Value
      description: |
        Live value message. Payload envelope is identical for all point types.
        The semantic meaning of `value` is determined by the corresponding
        metadata message.
      payload:
        type: object
        required:
          - value
          - timestamp
          - quality
        properties:
          value:
            oneOf:
              - type: number
              - type: 'null'
            description: >
              Live reading for the point (float). May be null when the BMS has no valid reading available.

            examples:
              - 22.96215
              - 0.239
              - null
              - 1
          timestamp:
            type: integer
            description: Unix timestamp in epoch milliseconds (source event time).
            examples:
              - 1743620423000
          quality:
            type: integer
            description: >
              `1` = good quality. Any other integer indicates value is not trustworthy

            examples:
              - 1
              - 0
        additionalProperties: false
    # Rack
    RackLiquidSupplyTemperatureMsg:
      name: RackLiquidSupplyTemperatureMsg
      title: Rack Liquid Supply Temperature
      payload:
        $ref: '#/components/schemas/RackLiquidSupplyTemperatureMetadata'
