      type: object
      description: Dimensionless 0–1. engUnit not required.
      properties:
        pointType:
          type: string
          enum: [PowerFactor]
        objectType:
          type: string
          enum: [PowerMeter]
    FrequencyFields:
      type: object
      required: [engUnit]
      properties:
        pointType:
          type: string
          enum: [Frequency]
        objectType:
          type: string
          enum: [PowerMeter]
        engUnit:
          type: string
          #enum: [Hz]
    ApparentPowerFields:
      type: object
      required: [engUnit]
      properties:
        pointType:
          type: string
          enum: [ApparentPower]
        objectType:
          type: string
          enum: [PowerMeter]
        engUnit:
          type: string
          #enum: [kVA]
    ActivePowerFields:
      type: object
      required: [engUnit]
      properties:
        pointType:
          type: string
          enum: [ActivePower]
        objectType:
          type: string
          enum: [PowerMeter]
        engUnit:
          type: string
          #enum: [kW]
    CurrentFields:
      type: object
      required: [engUnit]
      properties:
        pointType:
          type: string
          enum: [Current]
        objectType:
          type: string
          enum: [PowerMeter]
        engUnit:
          type: string
          #enum: [A]
    CurrentLimitFields:
      type: object
      required: [engUnit]
      properties:
        pointType:
          type: string
          enum: [CurrentLimit]
        objectType:
          type: string
          enum: [PowerMeter]
        engUnit:
          type: string
          #enum: [A]
    PhaseCurrentFields:
      type: object
      description: >
        PhaseCurrent additionally requires `phase` to identify which electrical phase. Accepts letter form (A, B, C) or numeric form (1, 2, 3); both are valid representations of the same three-phase system. 3 metadata messages per meter, one per phase.

      required:
        - engUnit
        - phase
      properties:
        pointType:
          type: string
          enum: [PhaseCurrent]
        objectType:
          type: string
          enum: [PowerMeter]
        engUnit:
          type: string
          #enum: [A]
        phase:
          type: string
          enum: [A, B, C, "1", "2", "3"]
          description: >
            Electrical phase identifier. Letter form (A/B/C) and numeric form (1/2/3) are both accepted to align with publisher conventions.

