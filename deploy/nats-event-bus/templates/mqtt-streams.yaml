  subjects:
    - $MQTT.sess.>
  storage: {{ $streams.storage }}
  replicas: {{ $streams.replicas }}
  retention: limits
  maxBytes: {{ $streams.maxBytes | int64 }}
  discard: old
---
apiVersion: jetstream.nats.io/v1beta2
kind: Stream
metadata:
  name: mqtt-qos2in
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: mqtt-streams
    app.kubernetes.io/part-of: nats-event-bus
spec:
