{{/*
JetStream streams for MQTT persistence. On CPC clusters, streams include
sources from CSC for cross-layer message replication via subject transforms.
*/}}
{{- $streams := .Values.global.eventBus.mqttStreams -}}
{{- $isCPC := eq .Values.global.eventBus.clusterType "cpc" -}}
{{- $clusterId := .Values.global.eventBus.clusterId -}}
{{- $crossLayer := .Values.global.eventBus.crossLayer -}}
---
apiVersion: jetstream.nats.io/v1beta2
kind: Stream
metadata:
  name: mqtt-msgs
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: mqtt-streams
    app.kubernetes.io/part-of: nats-event-bus
spec:
  name: $MQTT_msgs
  subjects:
    - $MQTT.msgs.>
  storage: {{ $streams.storage }}
  replicas: {{ $streams.replicas }}
  retention: limits
  maxBytes: {{ $streams.maxBytes | int64 }}
  maxAge: {{ $streams.maxAge | quote }}
  discard: old
  {{- if $isCPC }}
  sources:
    - name: $MQTT_msgs
      externalApiPrefix: $JS.CSC.API
      externalDeliverPrefix: csc2cpc.{{ $clusterId }}
      subjectTransforms:
        {{- range $crossLayer.cscExports }}
        - source: {{ printf "$MQTT.msgs.%s" . | quote }}
          dest: "" {{- /* NACK persists omitted destinations this way; keep SSA aligned. */}}
        {{- end }}
        {{- range $crossLayer.cscPrefixedExports }}
        - source: {{ printf "$MQTT.msgs.cpc.%s.%s" $clusterId . | quote }}
          dest: {{ printf "$MQTT.msgs.%s" . | quote }}
        {{- end }}
  {{- end }}
---
apiVersion: jetstream.nats.io/v1beta2
kind: Stream
metadata:
  name: mqtt-rmsgs
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: mqtt-streams
    app.kubernetes.io/part-of: nats-event-bus
spec:
  name: $MQTT_rmsgs
  subjects:
    - $MQTT.rmsgs.>
  storage: {{ $streams.storage }}
  replicas: {{ $streams.replicas }}
  retention: limits
  maxBytes: {{ $streams.maxBytes | int64 }}
  maxAge: {{ $streams.maxAge | quote }}
  discard: old
  maxMsgsPerSubject: 1
  {{- if $isCPC }}
  sources:
    - name: $MQTT_rmsgs
      externalApiPrefix: $JS.CSC.API
      externalDeliverPrefix: csc2cpc.{{ $clusterId }}
      subjectTransforms:
        {{- range $crossLayer.cscExports }}
        - source: {{ printf "$MQTT.rmsgs.%s" . | quote }}
          dest: "" {{- /* NACK persists omitted destinations this way; keep SSA aligned. */}}
        {{- end }}
        {{- range $crossLayer.cscPrefixedExports }}
        - source: {{ printf "$MQTT.rmsgs.cpc.%s.%s" $clusterId . | quote }}
          dest: {{ printf "$MQTT.rmsgs.%s" . | quote }}
        {{- end }}
  {{- end }}
---
apiVersion: jetstream.nats.io/v1beta2
kind: Stream
metadata:
  name: mqtt-sess
  namespace: {{ .Release.Namespace }}
