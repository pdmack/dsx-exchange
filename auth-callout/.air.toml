root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
args_bin = ["--config", "/etc/config/config.yaml"]
bin = "./tmp/main"
cmd = "go build -mod=vendor -gcflags=\"all=-N -l\" -o ./tmp/main ./src/cmd/auth_callout/main.go"
delay = 1000
exclude_dir = [
    "assets",
    "tmp",
    "vendor",
    "testdata",
    "docs",
    "deploy",
    "build",
    ".git",
    ".devspace",
    "bin",
    "localdev"
]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_dir = []
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]
include_file = []
kill_delay = "0s"
log = "build-errors.log"
poll = false
poll_interval = 0
post_cmd = []
pre_cmd = []
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_root = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
time = false

[misc]
clean_on_exit = false
