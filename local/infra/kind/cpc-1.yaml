kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: cpc-1
networking:
  # CPC-1 - Control Plane Cluster
  # Internal addresses overlap with CSC and other CPC clusters since clusters communicate via gateway only
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
  disableDefaultCNI: false
nodes:
- role: control-plane
  image: kindest/node:v1.31.9
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "layer=cpc-1,topology.kubernetes.io/zone=zone-a"
- role: worker
  image: kindest/node:v1.31.9
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "layer=cpc-1,topology.kubernetes.io/zone=zone-b"
- role: worker
  image: kindest/node:v1.31.9
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "layer=cpc-1,topology.kubernetes.io/zone=zone-c"
- role: worker
  image: kindest/node:v1.31.9
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "layer=cpc-1,topology.kubernetes.io/zone=zone-a"
